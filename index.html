                                    <polyline points="17 6 23 6 23 12"></polyline>

                    <li class="nav-item">

                            <span class="nav-icon-container">

                            <svg class="chevron-right" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>
                        </button>
                    </li>
                    <li class="nav-item">
                        <button class="nav-button" data-category="gestao-operacional" id="btn-gestao-operacional">

                                <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">

        </aside>
        
        <!-- Conteúdo Principal -->
        <main class="main-content">
            <!-- Topbar / Cabeçalho Superior -->
            <header class="topbar">
                <div class="topbar-left">
                    <button class="menu-toggle-btn" id="menu-toggle" aria-label="Toggle Sidebar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="3" y1="12" x2="21" y2="12"></line>
                            <line x1="3" y1="6" x2="21" y2="6"></line>
                            <line x1="3" y1="18" x2="21" y2="18"></line>
                        </svg>
                    </button>
                    <h1 class="topbar-title">Gestão de Indicadores - <span class="accent-text">Enel RJ</span></h1>
                </div>

            </header>
            
            <!-- Área do Painel Dinâmico -->
            <section class="dashboard-viewport" id="dashboard-viewport">
                <div class="dashboard-header">
                    <span class="dashboard-subtitle" id="view-subtitle">HUB DE INDICADORES</span>
                    <h2 class="dashboard-title" id="view-title">Bem-vindo ao Hub de Indicadores</h2>
                    <p class="dashboard-description" id="view-description">
                        Acesse os principais painéis e acompanhe os indicadores estratégicos da Enel RJ.
                    </p>
                    <div class="title-underline"></div>
                </div>
                
                <!-- Grid de Cards de Indicadores -->
                <div class="indicators-grid" id="indicators-grid">
                    <!-- Os cards serão gerados dinamicamente via JS ou exibidos aqui -->
                </div>
            </section>

            <!-- Visualizador Embutido de Power BI (Iframe/Detail Mode) -->
            <section class="iframe-viewport" id="iframe-viewport" style="display: none;">
                <div class="iframe-header">
                    <div class="iframe-header-left">
                        <button class="back-btn" id="btn-voltar-dashboard" title="Voltar ao Painel">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <line x1="19" y1="12" x2="5" y2="12"></line>
                                <polyline points="12 19 5 12 12 5"></polyline>
                            </svg>
                            Voltar ao Painel
                        </button>
                        <div class="iframe-info">
                            <span class="iframe-category" id="iframe-category-text">KPIs Operacionais</span>
                            <h3 class="iframe-title" id="iframe-title-text">Indicador Selecionado</h3>
                        </div>
                    </div>
                    <div class="iframe-header-right">
                        <a href="#" target="_blank" class="external-link-btn" id="iframe-external-link">
                            Abrir em Nova Aba
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                                <polyline points="15 3 21 3 21 9"></polyline>
                                <line x1="10" y1="14" x2="21" y2="3"></line>
                            </svg>
                        </a>
                    </div>
                </div>
                <div class="iframe-container">
                    <div class="iframe-loader" id="iframe-loader">
                        <div class="spinner"></div>
                        <p>Carregando Relatório do Power BI...</p>
                    </div>
                    <iframe src="" id="report-iframe" frameborder="0" allowFullScreen="true"></iframe>
                </div>
            </section>
        </main>
    </div>
    


    <!-- Script de inicialização e dados -->
    <script src="app.js"></script>
</body>
</html>
